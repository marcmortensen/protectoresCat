[build]
base = "apps/web"
publish = ".output/public"
command = "pnpm rebuild better-sqlite3 && pnpm --filter @protectorescat/web build-netlify"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
for = "/*"
[headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(self)"
